name: Generate Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats images
        run: |
          mkdir -p dist

          # GitHub Stats
          curl -sS -o dist/stats-dark.svg \
            "https://github-readme-stats.vercel.app/api?username=siraken&show_icons=true&theme=github_dark&hide_border=true" || true
          curl -sS -o dist/stats-light.svg \
            "https://github-readme-stats.vercel.app/api?username=siraken&show_icons=true&theme=default&hide_border=true" || true

          # Top Languages
          curl -sS -o dist/top-langs-dark.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=siraken&layout=compact&theme=github_dark&hide_border=true" || true
          curl -sS -o dist/top-langs-light.svg \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=siraken&layout=compact&theme=default&hide_border=true" || true

          # Streak Stats
          curl -sS -o dist/streak-dark.svg \
            "https://streak-stats.demolab.com/?user=siraken&theme=dark&hide_border=true" || true
          curl -sS -o dist/streak-light.svg \
            "https://streak-stats.demolab.com/?user=siraken&theme=default&hide_border=true" || true

          # Activity Graph
          curl -sS -o dist/activity-graph-dark.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=siraken&theme=github-compact&hide_border=true&area=true" || true
          curl -sS -o dist/activity-graph-light.svg \
            "https://github-readme-activity-graph.vercel.app/graph?username=siraken&theme=minimal&hide_border=true&area=true" || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || (git commit -m "chore: update stats" && git push)
